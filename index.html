<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neel2D — AI Companion</title>
  <meta name="description" content="Meet your 2D AI companion powered by Gemini. Chat, talk, and interact with a living anime character." />
  <meta name="theme-color" content="#0a0a1a" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body>
  <!-- Background particles -->
  <canvas id="bg-particles" aria-hidden="true"></canvas>

  <!-- Main character canvas -->
  <div id="character-stage">
    <canvas id="character-canvas"></canvas>
    <div id="character-name-tag">
      <span class="name-dot"></span>
      <span id="char-name">Neel</span>
      <span id="char-mood">relaxed</span>
    </div>
  </div>

  <!-- Chat panel overlay -->
  <div id="chat-panel" class="chat-panel">
    <div id="chat-header" class="chat-header">
      <div class="chat-header-left">
        <div class="chat-avatar">N</div>
        <div class="chat-header-info">
          <h2>Neel</h2>
          <span id="typing-status" class="typing-status">Online</span>
        </div>
      </div>
      <div class="chat-header-actions">
        <button id="btn-clear-chat" class="icon-btn" title="Clear chat">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6h14z"/></svg>
        </button>
        <button id="btn-toggle-chat" class="icon-btn" title="Minimize">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
        </button>
      </div>
    </div>
    <div id="chat-messages" class="chat-messages">
      <div class="welcome-msg">
        <div class="welcome-icon">✨</div>
        <p>Say hello to <strong>Neel</strong>! Type a message or press the mic button to talk.</p>
      </div>
    </div>
    <div id="chat-input-area" class="chat-input-area">
      <button id="btn-mic" class="mic-btn" title="Hold to speak">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="1" width="6" height="11" rx="3"/><path d="M19 10v1a7 7 0 01-14 0v-1"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      </button>
      <input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off" />
      <button id="btn-send" class="send-btn" title="Send">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>

  <!-- Floating controls -->
  <div id="controls" class="controls">
    <button id="btn-toggle-panel" class="control-btn" title="Toggle chat">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
    </button>
    <button id="btn-toggle-voice" class="control-btn" title="Toggle voice output">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 010 7.07"/><path d="M19.07 4.93a10 10 0 010 14.14"/></svg>
    </button>
    <button id="btn-fullscreen" class="control-btn" title="Fullscreen">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3M3 16v3a2 2 0 002 2h3m8 0h3a2 2 0 002-2v-3"/></svg>
    </button>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
